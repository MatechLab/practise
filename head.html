
<!DOCTYPE html>
<html>
<head>
<title>Menu Nav</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 50px;
  background:#111;
}

/* LOGO */
.logo{
  color:white;
  font-size:22px;
  font-weight:bold;
  display:flex;
  align-items:center;
}

.logo img{
  width:30px;
  margin-right:10px;
}

/* MENU */
.menu{
  list-style:none;
}

.menu li{
  display:inline-block;
  margin-left:25px;
  position:relative;
}

.menu li a{
  text-decoration:none;
  color:white;
  font-size:15px;
  transition:0.3s;
}

.menu li a:hover{
  color:#ff4d79;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:35px;
  left:0;
  background:white;
  display:none;
  min-width:150px;
  border-radius:5px;
}

.dropdown li{
  display:block;
  margin:0;
}

.dropdown li a{
  color:black;
  padding:10px;
  display:block;
}

.menu li:hover .dropdown{
  display:block;
}

.dropdown li a:hover{
  background:#f2f2f2;
}

/* BUTTON */
.nav-btn{
  padding:8px 15px;
  background:#ff4d79;
  color:white;
  border-radius:5px;
}

</style>
</head>

<body>

		<div class="navbar">

		  <!-- LOGO -->
		  <div class="logo">
			<img src="gift.png">
			MatchFix
		  </div>

		  <!-- MENU -->
		  <ul class="menu">
			<li><a href="#">Home</a></li>
			<li><a href="#">About</a></li>

			<li>
			  <a href="#">Services</a>
			  <ul class="dropdown">
				<li><a href="#">STEM Education</a></li>
				<li><a href="#">Consulting</a></li>
				<li><a href="#">Projects</a></li>
				<li><a href="#"> School Projects</a></li>
			  </ul>
			</li>

			<li><a href="#">Hands-on</a></li>
			<li><a href="#">Testimonials</a></li>
			<li><a href="#" class="nav-btn">Subscribe</a></li>
		  </ul>

		</div>

</body>
</html>
